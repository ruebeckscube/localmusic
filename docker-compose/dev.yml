services:
  web:
    extends:
      file: base.yml
      service: web
    command: python manage.py runserver 0.0.0.0:8000
    build:
      args:
        PIP_REQUIREMENTS: requirements/dev.txt
    volumes:
      - ../app:/app
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      - selenium
    environment:
      - DJANGO_HOST_NAME=web
      - SELENIUM_HOST_NAME=selenium

  selenium:
    image: selenium/standalone-firefox

  db:
    extends:
      file: base.yml
      service: db
    ports:
      - "5431:5432"

  mjml:
    extends:
      file: base.yml
      service: mjml

  memcached:
    extends:
      file: base.yml
      service: memcached

volumes:
   postgres_data:
