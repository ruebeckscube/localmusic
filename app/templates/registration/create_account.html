{% extends "localmusic/small_page.html" %}

{% block small_content %}
    <div class="p-3">
        <h1>Create an account</h1>
        <form method="post" action="{% url 'create_account' %}">
            {% csrf_token %}
            <div class="flex flex-col">
                <div class="errorlist">
                    {{ user_form.non_field_errors }}
                </div>
                {% for field in user_form %}
                    <div class="fieldgroup flex flex-col">
                        {{ field.as_field_group }}
                    </div>
                {% endfor %}
            </div>
            <div>
                <input class="btn block w-50 mx-auto mt-5" type="submit" value="Create account">
                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
            </div>
        </form>
    </div>
{% endblock %}
