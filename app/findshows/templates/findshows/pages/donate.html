{% extends "localmusic/base.html" %}
{% load findshows_tags %}
{% block content %}

<div class="p-3">
    <h1> Support the site! </h1>
{% custom_text 'DN' as donate_text %}
{% if donate_text %}
    <div class="fieldgroup markdown text-left w-11/12 max-w-3xl p-6 mx-auto">
        {{ donate_text }}
    </div>
{% else %}
    <div class="fieldgroup markdown text-left w-11/12 max-w-3xl p-6 mx-auto">
        No donation link has been set yet.
    </div>
{% endif %}
</div>

{% endblock %}
