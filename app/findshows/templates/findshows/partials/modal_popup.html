{% load static %}

<div class="w-full"
     x-data="modal_popup_data({{ initial_show }})"
     @keydown.escape.window="close_modal()"
     x-cloak
>

    {% if type == "form" %}
        <button type="button" class="{{ class|default:'btn w-full' }}" @click="open_modal()">
            {{ title }}
        </button>
        <div x-text="success_text">
        </div>
    {% endif %}

    <!--Overlay-->
    <div class="overflow-auto bg-black/50"
         x-show="show_modal"
         @keydown.enter.prevent
         :class="{ 'fixed inset-0 z-10 flex items-center justify-center': show_modal }">
        <!--Dialog-->
        <div class="modalform bg-background w-11/12 md:max-w-xl mx-auto shadow-lg py-4 text-left px-6"
             x-show="show_modal"
             x-trap.inert.noscroll="show_modal"
             @click.outside="close_modal()"
        >

            <!--Title-->
            <div class="flex justify-between items-center pb-3">
                <p class="text-2xl font-bold"> {{ title }}</p>
                <svg class="clickable-svg w-7 h-7 z-50 fill-current" viewBox="0 0 18 18"
                     @click="close_modal()">
                    <path d="M14.53 4.53l-1.06-1.06L9 7.94 4.53 3.47 3.47 4.53 7.94 9l-4.47 4.47 1.06 1.06L9 10.06l4.47 4.47 1.06-1.06L10.06 9z"></path>
                </svg>
            </div>

            <!-- content -->
            <div class="modal-form flex flex-col">
                {{ content }}
            </div>

            <!--Footer-->
            <div class="flex justify-end pt-2">
                <button type="button" class="btn" @click="close_modal()">Cancel</button>
                {% if type == "confirmation" %}
                    <button type="submit" class="btn">Save</button>
                {% elif type == "form" %}
                    <button type="button" class="btn"
                            hx-post="{{ hx_post }}"
                            hx-trigger="click,load,keydown[keyCode==13] from:closest .modalform"
                            hx-target="previous .modal-form"
                            @modal-form-success="on_successful_create"
                    >Submit</button>
                {% endif %}
            </div>


        </div>
        <!--/Dialog -->
    </div><!-- /Overlay -->

</div>

<script src='{% static "findshows/js/modal_popup_data.js" %}'></script>
